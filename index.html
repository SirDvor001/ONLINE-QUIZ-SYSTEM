const PracticeQuiz = ({ user }) => {
    const [subject, setSubject]         = useState('');
    const [limit, setLimit]             = useState(10);
    const [questions, setQuestions]     = useState([]);
    const [answers, setAnswers]         = useState({});
    const [result, setResult]           = useState(null);
    const [current, setCurrent]         = useState(0);
    const [started, setStarted]         = useState(false);
    const [submitting, setSubmitting]   = useState(false);

    const start = () => {
        const params = new URLSearchParams({ limit });
        if (subject) params.append('subject', subject);
        if (user.student_level) params.append('student_level', user.student_level);
        api.get('/practice/questions?' + params).then(qs => {
            if (qs.length===0) { alert('No questions found for selected filters.'); return; }
            setQuestions(qs); setAnswers({}); setResult(null); setCurrent(0); setStarted(true);
        });
    };

    const submit = async () => {
        setSubmitting(true);
        const data = await api.post('/practice/submit', { answers });
        setResult(data);
        setSubmitting(false);
    };

    const reset = () => { setStarted(false); setResult(null); setQuestions([]); setAnswers({}); };

    if (!started) {
        return (
            <div>
                <div className="pg-header"><h1><i className="fas fa-pen" style={{marginRight:'.75rem'}}></i>Practice Quiz</h1><p>Test yourself at your own pace – no timer, instant feedback!</p></div>
                <div className="card" style={{maxWidth:480}}>
                    <div style={{marginBottom:'1rem'}}>
                        <label className="form-label">Subject (optional)</label>
                        <select className="form-input" value={subject} onChange={e=>setSubject(e.target.value)}>
                            <option value="">All Subjects</option>
                            {SUBJECTS.map(s=><option key={s}>{s}</option>)}
                        </select>
                    </div>
                    <div style={{marginBottom:'1.5rem'}}>
                        <label className="form-label">Number of Questions</label>
                        <select className="form-input" value={limit} onChange={e=>setLimit(e.target.value)}>
                            <option value={5}>5</option><option value={10}>10</option><option value={15}>15</option><option value={20}>20</option>
                        </select>
                    </div>
                    <button onClick={start} className="btn btn-primary" style={{width:'100%',justifyContent:'center'}}>
                        <i className="fas fa-play"></i>Start Practice
                    </button>
                </div>
            </div>
        );
    }

    if (result) {
        return (
            <div>
                <div className="pg-header"><h1><i className="fas fa-check-circle" style={{marginRight:'.75rem'}}></i>Practice Results</h1></div>
                <div className="card" style={{textAlign:'center',padding:'2rem',marginBottom:'1.5rem'}}>
                    <div style={{fontSize:'4rem',fontWeight:900,color:result.percentage>=70?'#10b981':result.percentage>=50?'#f59e0b':'#ef4444'}}>{result.percentage}%</div>
                    <div style={{color:'#64748b',marginTop:'.5rem'}}>{result.score} / {result.total} points</div>
                    <button onClick={reset} className="btn btn-primary" style={{marginTop:'1.5rem'}}><i className="fas fa-redo"></i>Try Again</button>
                </div>

                {/* Show detailed results */}
                {result.details && result.details.map((d,i)=>(
                    <div key={i} className="card" style={{borderLeft:`4px solid ${d.is_correct?'#10b981':'#ef4444'}`}}>
                        <div style={{display:'flex',justifyContent:'space-between',marginBottom:'.75rem'}}>
                            <span style={{fontWeight:600,flex:1}}>{i+1}. {d.question_text}</span>
                            <Badge type={d.is_correct?'green':'red'}>{d.is_correct?'Correct':'Wrong'}</Badge>
                        </div>
                        <div style={{fontSize:'.85rem',color:'#64748b'}}>
                            Your answer: <strong style={{color:d.is_correct?'#10b981':'#ef4444'}}>{d.your_answer}</strong>

                        </div>
                    </div>

    const q = questions[current];

    return (
        <div>
            <div className="pg-header">
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <div><h1 style={{margin:0}}><i className="fas fa-pen" style={{marginRight:'.75rem'}}></i>Practice Quiz</h1><p style={{margin:'.25rem 0 0'}}>Question {current+1} of {questions.length}</p></div>
                    <button onClick={reset} className="btn btn-secondary" style={{fontSize:'.8rem',padding:'.5rem 1rem'}}><i className="fas fa-times"></i>Quit</button>
                </div>
                <div className="progress-bar" style={{marginTop:'1rem'}}>
                    <div className="progress-fill" style={{width:`${((current+1)/questions.length)*100}%`,background:'var(--gold)'}}></div>
                </div>
            </div>

            <div className="card">
                <div style={{marginBottom:'1rem'}}><Badge type="dark">{q.subject}</Badge> <Badge type="yellow">{q.points} pts</Badge></div>
                <h2 style={{fontWeight:700,marginBottom:'1.5rem'}}>{q.question_text}</h2>
                {Object.entries(q.options).map(([l,t]) => (
                    <div key={l} className={`quiz-opt ${answers[q.id]===l?'sel':''}`} onClick={()=>setAnswers({...answers,[q.id]:l})}>

                    : <button onClick={submit} className="btn btn-gold" disabled={submitting}>

                    </button>
                }
            </div>
        </div>
    );
};

// MAIN APP
// ══════════════════════════════════════════════════════════════════════════════
const App = () => {
    const [user, setUser]         = useState(null);
    const [menu, setMenu]         = useState('overview');
    const [ready, setReady]       = useState(false);
    const [showLanding, setShowLanding] = useState(false);

    useEffect(() => {
        const saved = localStorage.getItem('qm_user');
        if (saved) { try { setUser(JSON.parse(saved)); } catch {} }
        else { setShowLanding(true); }
        setReady(true);
    }, []);

    const logout = () => {
        localStorage.removeItem('qm_user');
        setUser(null);
        setMenu('overview');
        setShowLanding(true);
    };

    if (!ready) return <div style={{display:'flex',justifyContent:'center',alignItems:'center',height:'100vh',background:'#050c0a'}}><div className="spinner"></div></div>;

    // Show landing if not logged in
    if (!user && showLanding) return <LandingPage onEnter={()=>setShowLanding(false)} />;

    // Show login if landing was dismissed
    if (!user) return <LoginPage onLogin={u=>{ setUser(u); setMenu('overview'); }} />;

    const isAdmin = user.role === 'admin';

    const renderPage = () => {
        if (isAdmin) {
            if (menu==='overview')     return <AdminOverview />;
            if (menu==='students')     return <StudentManagement />;
            if (menu==='questions')    return <QuestionManagement />;
            if (menu==='competitions') return <CompetitionManagement />;
            if (menu==='analytics')   return <AnalyticsDashboard />;
        } else {
            if (menu==='overview')     return <StudentOverview user={user} />;
            if (menu==='competitions') return <StudentCompetitions user={user} />;
            if (menu==='practice')     return <PracticeQuiz user={user} />;
            if (menu==='results')      return <StudentResults user={user} />;
        }
    };

    return (
        <DashboardLayout user={user} activeMenu={menu} setActiveMenu={setMenu} onLogout={logout}>
            {renderPage()}
        </DashboardLayout>
    );
};

ReactDOM.render(<App />, document.getElementById('root'));
</script>
